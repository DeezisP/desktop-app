appId: com.perfectelt.warehouse
productName: Admin Perfect Electronic
copyright: Copyright © 2024 Perfect Electronic

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: resources/
    to: .
    filter:
      - "*.png"
      - "*.ico"

# ── Windows build ─────────────────────────────────────────────────────────────

protocols:
  - name: Admin Perfect Electronic
    schemes:
      - desktopwarehouse

win:
  icon: resources/icon.ico

  # ── Code signing ────────────────────────────────────────────────────────────
  #
  # Unsigned builds will trigger a SmartScreen "Unknown publisher" warning on
  # end-user machines. To remove the warning you need a code signing certificate.
  #
  # OV (Organisation Validated) certificate — standard signing:
  #   Removes SmartScreen after your app accumulates enough reputation.
  #   Store the PFX file securely (do NOT commit it to git).
  #
  #   signingHashAlgorithms: ["sha256"]
  #   certificateFile: path/to/your-ov-certificate.pfx
  #   certificatePassword: ${CSC_KEY_PASSWORD}   # set via env var in CI
  #
  # EV (Extended Validation) certificate — immediate SmartScreen approval:
  #   Required for HSM-based tokens (USB hardware key). EV certs bypass
  #   reputation entirely — SmartScreen shows "Verified publisher" on first run.
  #
  #   signingHashAlgorithms: ["sha256"]
  #   certificateSubjectName: "Perfect Electronic Co., Ltd."  # must match cert CN
  #   # EV certs use a hardware token; set CSC_LINK and CSC_KEY_PASSWORD in CI.
  #
  # CI environment variables:
  #   CSC_LINK          — path or base64-encoded PFX (for OV)
  #   CSC_KEY_PASSWORD  — PFX password
  #   WIN_CSC_LINK      — Windows-specific override (if needed)
  #
  # Reference: https://www.electron.build/code-signing

  target:
    - target: nsis
      arch:
        - x64

# ── NSIS installer ────────────────────────────────────────────────────────────

nsis:
  # Explicit artifact name with dots — prevents the space→hyphen mismatch
  # between latest.yml and the GitHub-normalized download URL (space→dot).
  # Both the .exe and latest.yml path must be identical for auto-updater.
  artifactName: Admin.Perfect.Electronic.Setup.${version}.${ext}
  # Custom init hook: removes stale uninstall registry keys whose recorded
  # InstallLocation no longer exists on disk. Prevents the installer from
  # trying to run a missing old uninstaller and showing:
  #   "Failed to uninstall old application files.: 2" (ERROR_FILE_NOT_FOUND)
  include: resources/installer.nsh
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Admin Perfect Electronic
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false

  # ── Differential / blockmap updates ─────────────────────────────────────────
  # differentialPackage stores each app file as a separate compressed entry
  # inside the NSIS installer (instead of one solid LZMA stream). This means
  # a changed JS bundle only dirties its own compressed block rather than
  # invalidating the entire archive, giving electron-updater 80–95% bandwidth
  # savings on routine version bumps.
  #
  # electron-builder always writes a .blockmap alongside the .exe.
  # That file MUST be published to GitHub Releases so electron-updater can
  # fetch it, compare it to the locally-cached installer, and download only
  # the changed blocks. See build.yml for the upload step.
  differentialPackage: true

# ── Auto-update publishing ────────────────────────────────────────────────────
# electron-updater reads this section to know where to check for new releases.
# Releases must be published (not draft) for auto-update to find them.
# Version tags must match semver: v1.0.0, v1.0.1, v1.0.2, ...
#
# To publish a release:
#   1. Bump version in package.json
#   2. npm run dist        → builds + packages
#   3. Push tag:  git tag v1.0.1 && git push origin v1.0.1
#   4. electron-builder publishes the assets to the GitHub release.
#   5. Change releaseType from "draft" to "release" when ready for end users.

publish:
  provider: github
  owner: DeezisP
  repo: desktop-app
  releaseType: release
