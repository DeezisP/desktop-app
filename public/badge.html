<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: no-drag;
    user-select: none;
  }

  .badge-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100%;
    height: 100%;
    padding: 8px;
  }

  .badge {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.55), 0 0 0 3px rgba(59, 130, 246, 0.25);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .badge:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(37, 99, 235, 0.7), 0 0 0 4px rgba(59, 130, 246, 0.35);
  }

  .badge:active {
    transform: scale(0.96);
  }

  .badge-icon {
    font-size: 20px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .badge-count {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.3px;
  }

  /* Red dot for new message indicator */
  .pulse-ring {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ef4444;
    border: 2px solid #fff;
    animation: pulse-dot 1.8s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70%  { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  @keyframes pop-in {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<div class="badge-wrap">
  <div class="badge" id="badge" onclick="handleClick()">
    <span class="pulse-ring"></span>
    <span class="badge-icon">💬</span>
    <span class="badge-count" id="count">1</span>
  </div>
</div>

<script>
  function handleClick() {
    if (window.badgeAPI) {
      window.badgeAPI.clickBadge()
    }
  }

  if (window.badgeAPI) {
    window.badgeAPI.onCount(function(count) {
      var el = document.getElementById('count')
      if (el) el.textContent = count > 99 ? '99+' : String(count)
    })
  }
</script>
</body>
</html>
