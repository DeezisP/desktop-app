<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: no-drag;
    user-select: none;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    width: 100%;
    height: 100%;
    padding: 8px;
    gap: 8px;
  }

  .toast {
    flex-shrink: 0;
    height: 72px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 12px;
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.10);
    border-left: 3px solid #FF9500;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
  }

  .toast:hover { background: #243146; }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    letter-spacing: -0.5px;
  }

  .body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .sender {
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.3;
  }

  .message {
    font-size: 12px;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.3;
  }

  .close-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none;
    color: #64748b;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }

  .close-btn:hover { background: rgba(255,255,255,0.14); color: #f1f5f9; }

  .progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #FF9500;
    border-radius: 0 0 0 12px;
  }

  @keyframes slide-in {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  @keyframes slide-out {
    from { transform: translateX(0);    opacity: 1; }
    to   { transform: translateX(110%); opacity: 0; }
  }

  @keyframes shrink {
    from { width: 100%; }
    to   { width: 0%; }
  }
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>

<script>
  var TOAST_DURATION = 4000
  var rendered = {}  // toastId -> { el, count, timer }

  function restartAnim(el, anim) {
    el.style.animation = 'none'
    void el.offsetWidth
    el.style.animation = anim
  }

  function buildToastEl(item) {
    var el = document.createElement('div')
    el.className = 'toast'
    el.dataset.toastId = item.toastId

    var avatar = document.createElement('div')
    avatar.className = 'avatar'

    var body = document.createElement('div')
    body.className = 'body'
    var sender = document.createElement('div')
    sender.className = 'sender'
    var message = document.createElement('div')
    message.className = 'message'
    body.appendChild(sender)
    body.appendChild(message)

    var closeBtn = document.createElement('button')
    closeBtn.className = 'close-btn'
    closeBtn.textContent = '✕'

    var progress = document.createElement('div')
    progress.className = 'progress'

    el.appendChild(avatar)
    el.appendChild(body)
    el.appendChild(closeBtn)
    el.appendChild(progress)

    el.addEventListener('click', function (e) {
      if (e.target === closeBtn) return
      if (window.toastAPI) window.toastAPI.click(item.roomId)
      dismiss(item.toastId)
    })
    closeBtn.addEventListener('click', function (e) {
      e.stopPropagation()
      dismiss(item.toastId)
    })

    return { el: el, avatar: avatar, sender: sender, message: message, progress: progress }
  }

  function paint(refs, item) {
    refs.avatar.textContent = item.senderInitials
    refs.avatar.style.background = item.avatarColor
    refs.sender.textContent = item.senderName
    refs.message.textContent = item.messagePreview
  }

  function startTimer(toastId, entry) {
    if (entry.timer) clearTimeout(entry.timer)
    restartAnim(entry.refs.progress, 'shrink ' + TOAST_DURATION + 'ms linear both')
    entry.timer = setTimeout(function () { dismiss(toastId) }, TOAST_DURATION)
  }

  function dismiss(toastId) {
    var entry = rendered[toastId]
    if (!entry || entry.dismissing) return
    entry.dismissing = true
    if (entry.timer) clearTimeout(entry.timer)
    restartAnim(entry.refs.el, 'slide-out 280ms ease-in both')
    setTimeout(function () {
      if (entry.refs.el.parentNode) entry.refs.el.parentNode.removeChild(entry.refs.el)
      delete rendered[toastId]
      if (window.toastAPI) window.toastAPI.itemDone(toastId)
    }, 280)
  }

  function render(items) {
    var wrap = document.getElementById('wrap')
    var incomingIds = {}

    items.forEach(function (item) {
      incomingIds[item.toastId] = true
      var entry = rendered[item.toastId]

      if (!entry) {
        var refs = buildToastEl(item)
        wrap.appendChild(refs.el)
        entry = { refs: refs, count: item.count, timer: null, dismissing: false }
        rendered[item.toastId] = entry
        paint(refs, item)
        restartAnim(refs.el, 'slide-in 320ms cubic-bezier(0.34,1.2,0.64,1) both')
        startTimer(item.toastId, entry)
      } else if (item.count !== entry.count) {
        // Merged a new message into an already-visible toast — refresh
        // content and restart its countdown, but leave its slot in the stack.
        entry.count = item.count
        paint(entry.refs, item)
        startTimer(item.toastId, entry)
      }
    })

    // Defensive cleanup if main process ever drops an id we didn't dismiss
    // ourselves (e.g. evicted past the max-visible cap).
    Object.keys(rendered).forEach(function (toastId) {
      if (!incomingIds[toastId]) {
        var entry = rendered[toastId]
        if (entry.timer) clearTimeout(entry.timer)
        if (entry.refs.el.parentNode) entry.refs.el.parentNode.removeChild(entry.refs.el)
        delete rendered[toastId]
      }
    })
  }

  if (window.toastAPI) {
    window.toastAPI.onSync(function (items) {
      console.log('[toast.html] sync count=' + items.length)
      render(items)
    })
    console.log('[toast.html] initialized')
  } else {
    console.error('[toast.html] window.toastAPI not available — preload failed')
  }
</script>
</body>
</html>
