<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: no-drag;
    user-select: none;
  }

  .wrap {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100%;
    height: 100%;
    padding: 6px;
  }

  .toast {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 12px;
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.10);
    border-left: 3px solid #FF9500;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
  }

  .toast:hover { background: #243146; }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    letter-spacing: -0.5px;
  }

  .body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .sender {
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.3;
  }

  .message {
    font-size: 12px;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.3;
  }

  .close-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none;
    color: #64748b;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }

  .close-btn:hover { background: rgba(255,255,255,0.14); color: #f1f5f9; }

  .progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #FF9500;
    border-radius: 0 0 0 12px;
  }

  @keyframes slide-in {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  @keyframes slide-out {
    from { transform: translateX(0);    opacity: 1; }
    to   { transform: translateX(110%); opacity: 0; }
  }

  @keyframes shrink {
    from { width: 100%; }
    to   { width: 0%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="toast" id="toast">
    <div class="avatar" id="avatar">AB</div>
    <div class="body">
      <div class="sender" id="sender">ผู้ส่ง</div>
      <div class="message" id="message">ข้อความ...</div>
    </div>
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
  var currentRoomId = 0
  var hideTimer = null
  var progressTimer = null

  function clearTimers() {
    if (hideTimer)    { clearTimeout(hideTimer);    hideTimer    = null }
    if (progressTimer){ clearTimeout(progressTimer); progressTimer = null }
  }

  function restartAnim(el, anim) {
    el.style.animation = 'none'
    void el.offsetWidth
    el.style.animation = anim
  }

  function dismiss() {
    clearTimers()
    var toast = document.getElementById('toast')
    restartAnim(toast, 'slide-out 280ms ease-in both')
    progressTimer = setTimeout(function() {
      if (window.toastAPI) window.toastAPI.done()
    }, 290)
  }

  document.getElementById('toast').addEventListener('click', function(e) {
    if (e.target.id === 'closeBtn') return
    clearTimers()
    if (window.toastAPI) window.toastAPI.click(currentRoomId)
    dismiss()
  })

  document.getElementById('closeBtn').addEventListener('click', function(e) {
    e.stopPropagation()
    dismiss()
  })

  if (window.toastAPI) {
    window.toastAPI.onShow(function(payload) {
      console.log('[toast.html] onShow room=' + payload.roomId + ' sender="' + payload.senderName + '"')
      currentRoomId = payload.roomId

      document.getElementById('avatar').textContent    = payload.senderInitials
      document.getElementById('avatar').style.background = payload.avatarColor
      document.getElementById('sender').textContent    = payload.senderName
      document.getElementById('message').textContent   = payload.messagePreview

      clearTimers()
      var toast    = document.getElementById('toast')
      var progress = document.getElementById('progress')

      restartAnim(toast,    'slide-in 320ms cubic-bezier(0.34,1.2,0.64,1) both')
      restartAnim(progress, 'shrink 4000ms linear both')

      hideTimer = setTimeout(dismiss, 4000)
    })

    console.log('[toast.html] initialized')
  } else {
    console.error('[toast.html] window.toastAPI not available — preload failed')
  }
</script>
</body>
</html>
