name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# Grant the GITHUB_TOKEN write access to repository contents so the release
# step can create GitHub Releases and upload assets (exe + latest.yml).
# Without this, softprops/action-gh-release@v2 fails with:
#   403 Resource not accessible by integration
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate application icons
        run: node scripts/generate-icon.js

      - name: Build React renderer + Electron entry points
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://perfectelt.com/perfect/v1' }}
          VITE_WS_URL:  ${{ secrets.VITE_WS_URL  || 'https://perfectelt.com/perfect/v1/ws/websocket' }}
          VITE_STATION_ID: DESKTOP

      - name: Build Electron installer
        # --publish never: build artifacts locally; the release step below uploads them.
        # electron-builder always writes latest.yml alongside the .exe when building
        # a full NSIS target (not --dir). Both files are required by electron-updater.
        #
        # UPDATER_TOKEN is a Personal Access Token with read:packages or
        # repo (read) scope stored as a repository secret. It is injected here so
        # that the packaged app can authenticate against the private GitHub Releases
        # feed at runtime. The token is ONLY readable inside the Electron main
        # process via process.env.UPDATER_TOKEN — it is never forwarded to
        # the renderer, preload, or contextBridge.
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}

      - name: List release artifacts (debug)
        run: dir release
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectELTWarehouseSetup
          path: |
            release/*.exe
            release/latest.yml
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Both files are required for electron-updater auto-update to work:
          #   *.exe       — NSIS installer end-users download on first install or manual update
          #   latest.yml  — version manifest electron-updater fetches to detect new releases
          files: |
            release/*.exe
            release/latest.yml
          name: Perfect ELT Warehouse ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
